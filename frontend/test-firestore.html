<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firestore Connection Test</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { color: #333; margin-bottom: 10px; }
    .status { padding: 15px; border-radius: 8px; margin: 20px 0; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    .collection {
      margin: 20px 0;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 4px solid #007bff;
    }
    pre {
      background: #272822;
      color: #f8f8f2;
      padding: 15px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 13px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-right: 10px;
    }
    button:hover { background: #0056b3; }
    .count { font-weight: bold; color: #007bff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔥 Firestore Connection Test</h1>
    <p>Testing connection to: <strong>devlog-vibhor-gemini</strong></p>

    <div id="status" class="status info">
      ⏳ Initializing Firebase...
    </div>

    <button onclick="testConnection()">🔄 Test Connection</button>
    <button onclick="fetchAllData()">📊 Fetch All Data</button>
    <button onclick="clearResults()">🗑️ Clear Results</button>

    <div id="results"></div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, collection, getDocs, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    // REPLACE WITH YOUR FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "devlog-vibhor-gemini.firebaseapp.com",
      projectId: "devlog-vibhor-gemini",
      storageBucket: "devlog-vibhor-gemini.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    let db;
    let app;

    try {
      app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      document.getElementById('status').className = 'status success';
      document.getElementById('status').innerHTML = '✅ Firebase initialized successfully!';
      console.log('✅ Firebase initialized');
    } catch (error) {
      document.getElementById('status').className = 'status error';
      document.getElementById('status').innerHTML = `❌ Firebase initialization failed: ${error.message}`;
      console.error('❌ Firebase error:', error);
    }

    window.testConnection = async function() {
      const statusEl = document.getElementById('status');
      statusEl.className = 'status info';
      statusEl.innerHTML = '⏳ Testing connection...';

      try {
        const testDoc = await getDoc(doc(db, 'devlog', 'current'));

        if (testDoc.exists()) {
          statusEl.className = 'status success';
          statusEl.innerHTML = '✅ Connection successful! Firestore is accessible.';
          console.log('✅ Test document retrieved:', testDoc.data());
        } else {
          statusEl.className = 'status info';
          statusEl.innerHTML = '⚠️ Connection works but devlog/current document does not exist yet.';
        }
      } catch (error) {
        statusEl.className = 'status error';
        statusEl.innerHTML = `❌ Connection failed: ${error.message}`;
        console.error('❌ Connection error:', error);
      }
    };

    window.fetchAllData = async function() {
      const resultsEl = document.getElementById('results');
      resultsEl.innerHTML = '<div class="status info">⏳ Fetching data from all collections...</div>';

      try {
        const collections = ['changes', 'decisions', 'snapshots', 'todos'];
        let html = '';

        for (const collName of collections) {
          const snapshot = await getDocs(collection(db, collName));
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

          console.log(`📊 ${collName.toUpperCase()}:`, data);

          html += `
            <div class="collection">
              <h3>📁 ${collName}</h3>
              <p>Documents: <span class="count">${snapshot.docs.length}</span></p>
              <pre>${JSON.stringify(data, null, 2)}</pre>
            </div>
          `;
        }

        // Fetch documents
        const devlogDoc = await getDoc(doc(db, 'devlog', 'current'));
        const statusDoc = await getDoc(doc(db, 'status', 'current'));

        html += `
          <div class="collection">
            <h3>📄 devlog/current</h3>
            <p>Exists: <span class="count">${devlogDoc.exists()}</span></p>
            <pre>${devlogDoc.exists() ? JSON.stringify(devlogDoc.data(), null, 2) : 'Document does not exist'}</pre>
          </div>

          <div class="collection">
            <h3>🏥 status/current</h3>
            <p>Exists: <span class="count">${statusDoc.exists()}</span></p>
            <pre>${statusDoc.exists() ? JSON.stringify(statusDoc.data(), null, 2) : 'Document does not exist'}</pre>
          </div>
        `;

        resultsEl.innerHTML = html;

      } catch (error) {
        resultsEl.innerHTML = `<div class="status error">❌ Error fetching data: ${error.message}</div>`;
        console.error('❌ Fetch error:', error);
      }
    };

    window.clearResults = function() {
      document.getElementById('results').innerHTML = '';
    };

    // Auto-test on load
    window.addEventListener('load', () => {
      setTimeout(testConnection, 1000);
    });
  </script>
</body>
</html>
